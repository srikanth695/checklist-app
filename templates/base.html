<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Checklist App{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
        <span class="badge bg-light text-primary me-2">✓</span>Checklist
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.index') }}">Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.habits_page') }}">Habits</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.journal_page') }}">Journal</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.ai_page') }}">Goals & AI</a>
          </li>
          <li class="nav-item ms-2">
            <button class="btn btn-sm btn-outline-light" id="themeToggle" title="Toggle dark mode">
              <span id="themeIcon">🌙</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="footer mt-5 py-3 bg-light">
    <div class="container text-center">
      <small class="text-muted">Checklist App &copy; 2026 | Built with Flask</small>
    </div>
  </footer>

  <script>
    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-bs-theme', savedTheme);
    themeIcon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeIcon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
