{% if habits %}
<div class="list-group">
  {% for h in habits %}
  <div class="list-group-item">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h6 class="mb-1">{{ h.name }}</h6>
        <div class="small text-muted">
          📊 Streak: <strong>{{ h.streak }}</strong> days
          {% if h.last_completed %}
          | Last: {{ h.last_completed }}
          {% endif %}
        </div>
      </div>
      <span class="badge bg-info text-dark">{{ h.frequency | capitalize }}</span>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="empty-state">
  <div class="empty-state-icon">🎯</div>
  <p>No habits yet. Create one to start building consistency!</p>
</div>
{% endif %}
